<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CUSIP Lookup — Investment Strategy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px 80px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 28px rgba(0,0,0,0.09);
      width: 100%;
      max-width: 720px;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #1a56db 0%, #1447c0 100%);
      padding: 28px 32px;
      color: #fff;
    }

    .card-header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.3px; }
    .card-header p  { margin-top: 5px; font-size: 0.875rem; opacity: 0.82; }

    .card-body { padding: 28px 32px; }

    .input-row { display: flex; gap: 10px; }

    .input-row input {
      flex: 1;
      padding: 11px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      font-family: "SF Mono", "Fira Code", monospace;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-row input:focus { border-color: #1a56db; }

    .input-row button {
      padding: 11px 24px;
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .input-row button:hover    { background: #1447c0; }
    .input-row button:disabled { background: #93aad6; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      display: none;
      margin-top: 28px;
      text-align: center;
      color: #6b7280;
      font-size: 0.875rem;
    }
    .spinner::before {
      content: "";
      display: inline-block;
      width: 16px; height: 16px;
      border: 2.5px solid #e5e7eb;
      border-top-color: #1a56db;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-box {
      margin-top: 24px;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 14px 16px;
      color: #b91c1c;
      font-size: 0.875rem;
    }

    /* Result layout */
    #result { margin-top: 28px; }

    .result-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 3px;
    }
    .result-meta {
      font-size: 0.8rem;
      color: #6b7280;
      font-family: "SF Mono", "Fira Code", monospace;
      margin-bottom: 6px;
    }
    .result-desc {
      font-size: 0.82rem;
      color: #4b5563;
      line-height: 1.55;
      margin-bottom: 20px;
      padding: 12px 14px;
      background: #f9fafb;
      border-radius: 8px;
      border-left: 3px solid #d1d5db;
    }

    /* Section headers */
    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: #9ca3af;
      margin: 20px 0 10px;
    }

    /* Generic field grid */
    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .fields-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

    .field {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px 14px;
    }
    .field-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #9ca3af;
      margin-bottom: 5px;
    }
    .field-value       { font-size: 0.9rem; font-weight: 600; color: #111827; }
    .field-value.empty { color: #d1d5db; font-style: italic; font-weight: 400; }

    /* Salesforce enriched section */
    .sf-section {
      margin-top: 20px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      padding: 16px 18px;
    }
    .sf-section .section-label { color: #2563eb; margin-top: 0; }
    .sf-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .sf-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .sf-field {
      background: #fff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 12px 14px;
    }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge-blue   { background: #dbeafe; color: #1d4ed8; }
    .badge-green  { background: #dcfce7; color: #15803d; }
    .badge-purple { background: #f3e8ff; color: #7e22ce; }
    .badge-orange { background: #fff7ed; color: #c2410c; }
    .badge-teal   { background: #ccfbf1; color: #0f766e; }
    .badge-gray   { background: #f3f4f6; color: #6b7280; }

    .unresolved { font-size: 0.8rem; color: #9ca3af; font-style: italic; }

    @media (max-width: 520px) {
      .fields-grid, .sf-grid { grid-template-columns: 1fr; }
      .fields-grid.cols-3, .sf-grid.cols-3 { grid-template-columns: 1fr 1fr; }
      .card-body, .card-header { padding: 20px; }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <h1>Investment Strategy Lookup</h1>
    <p>Enter a CUSIP to view enriched Salesforce field values</p>
  </div>
  <div class="card-body">
    <div class="input-row">
      <input id="cusipInput" type="text" placeholder="e.g. 00777X520" maxlength="9" />
      <button id="lookupBtn" onclick="doLookup()">Look Up</button>
    </div>
    <div class="spinner" id="spinner">Looking up CUSIP…</div>
    <div id="result"></div>
  </div>
</div>

<script>
  const input   = document.getElementById("cusipInput");
  const btn     = document.getElementById("lookupBtn");
  const spinner = document.getElementById("spinner");
  const result  = document.getElementById("result");

  input.addEventListener("keydown", e => { if (e.key === "Enter") doLookup(); });

  function fv(value, badgeClass) {
    if (!value) return `<span class="field-value empty">—</span>`;
    if (badgeClass) return `<span class="badge ${badgeClass}">${value}</span>`;
    return `<span class="field-value">${value}</span>`;
  }

  function sfField(label, value, badgeClass) {
    return `
      <div class="sf-field">
        <div class="field-label">${label}</div>
        ${fv(value, badgeClass)}
      </div>`;
  }

  function rawField(label, value) {
    return `
      <div class="field">
        <div class="field-label">${label}</div>
        ${fv(value)}
      </div>`;
  }

  async function doLookup() {
    const cusip = input.value.trim();
    if (!cusip) return;

    btn.disabled = true;
    spinner.style.display = "block";
    result.innerHTML = "";

    try {
      const resp = await fetch("/lookup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ cusip })
      });
      const d = await resp.json();

      if (!resp.ok) {
        result.innerHTML = `<div class="error-box">${d.error}</div>`;
        return;
      }

      result.innerHTML = `
        <div class="result-name">${d.name || "Unknown"}</div>
        <div class="result-meta">
          ${d.cusip}${d.ticker ? " · " + d.ticker : ""}${d.figi ? " · FIGI: " + d.figi : ""}${d.fund_family ? " · " + d.fund_family : ""}
        </div>
        ${d.description ? `<div class="result-desc">${d.description}</div>` : ""}

        <div class="section-label">Security Details</div>
        <div class="fields-grid cols-3">
          ${rawField("Security Type",   d.security_type)}
          ${rawField("Security Type 2", d.security_type2)}
          ${rawField("Market Sector",   d.market_sector)}
          ${rawField("Exchange",        d.exchange)}
          ${rawField("yFinance Category", d.yf_category)}
          ${rawField("Currency",        "USD")}
        </div>

        <div class="sf-section">
          <div class="section-label">Salesforce Fields — Investment_Strategy__c</div>
          <div class="sf-grid cols-3">
            ${sfField("Product Structure",  d.product_structure,  "badge-blue")}
            ${sfField("Asset Class",         d.asset_class,        "badge-green")}
            ${sfField("Sub-Asset Class",     d.sub_asset_class,    "badge-purple")}
            ${sfField("Active / Passive",    d.active_passive,     "badge-orange")}
            ${sfField("Geography",           d.geography,          "badge-teal")}
            ${sfField("Fund Type",           d.fund_type,          "badge-gray")}
            ${sfField("Sector",              d.sector,             "badge-gray")}
            ${sfField("Strategy AUM",        d.aum)}
            ${sfField("Inception Date",      d.inception_date)}
          </div>
        </div>`;
    } catch (e) {
      result.innerHTML = `<div class="error-box">Request failed. Is the server running?</div>`;
    } finally {
      btn.disabled = false;
      spinner.style.display = "none";
    }
  }
</script>
</body>
</html>
